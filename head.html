<script>
  // Register immediately (sync, before any deferred/module scripts) so the
  // A/B experimentation extension always gets a response, even if it fires
  // before ES modules have loaded.
  window.addEventListener('message', function onExperimentationConfig(event) {
    if (event.data && event.data.type === 'hlx:experimentation-get-config' && event.source) {
      event.source.postMessage({
        type: 'hlx:experimentation-config',
        config: { experiments: [], audiences: [], campaigns: [] },
        source: 'no-experiments',
      }, '*');
    }
  });
</script>
